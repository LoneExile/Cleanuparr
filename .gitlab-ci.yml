# GitLab CI for Cleanuparr (fork with Postgres support).
# Builds the container image with rootless BuildKit and pushes to Harbor.
# The Dockerfile is at code/Dockerfile (multi-stage: Angular frontend + .NET backend).

stages:
  - build

build-image:
  stage: build
  rules:
    - if: '$REGISTRY_IMAGE == null'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG'
  image:
    name: moby/buildkit:v0.31.1-rootless
    entrypoint: [""]
  variables:
    BUILDKITD_FLAGS: --oci-worker-no-process-sandbox
    DOCKER_CONFIG: /home/user/.docker
  script:
    - mkdir -p "$DOCKER_CONFIG"
    - |
      REGISTRY="${REGISTRY_IMAGE%%/*}"
      AUTH=$(printf '%s' "$REGISTRY_USER:$REGISTRY_PASS" | base64 | tr -d '\n')
      cat > "$DOCKER_CONFIG/config.json" <<EOF
      {"auths":{"$REGISTRY":{"auth":"$AUTH"}}}
      EOF
    - |
      buildctl-daemonless.sh build \
        --frontend dockerfile.v0 \
        --local context="$CI_PROJECT_DIR/code" \
        --local dockerfile="$CI_PROJECT_DIR/code" \
        --opt filename=Dockerfile \
        --opt build-arg:PACKAGES_USERNAME="$PACKAGES_USERNAME" \
        --opt build-arg:PACKAGES_PAT="$PACKAGES_PAT" \
        --output type=image,\"name=$REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA,$REGISTRY_IMAGE:latest\",push=true
